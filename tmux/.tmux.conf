# ~/.tmux.conf

# Mouse support
set -g mouse on

# Split panes with | and -
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# Vim-style pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Resize panes with Ctrl+arrows (no prefix needed)
bind -n C-Left  resize-pane -L 5
bind -n C-Right resize-pane -R 5
bind -n C-Up    resize-pane -U 5
bind -n C-Down  resize-pane -D 5

# True color support (needed for Neovim themes like kanagawa)
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# Increase scrollback buffer
set -g history-limit 10000

# Don't rename windows automatically
set-option -g allow-rename off

# Status bar
set -g status-position bottom
set -g status-style 'bg=#1a1a22 fg=#c5c9c5'
set -g status-left '#[fg=#7e9cd8,bold] #S '
set -g status-left-length 20
set -g status-right '#[fg=#7e9cd8] %H:%M #[fg=#c5c9c5]| #[fg=#7e9cd8]%d %b '
set -g status-right-length 40

# Window status (matches kanagawa dragon palette)
set -g window-status-current-style 'fg=#c8c093,bold'
set -g window-status-current-format ' #I:#W '
set -g window-status-format ' #I:#W '

# Pane borders
set -g pane-border-style 'fg=#2a2a37'
set -g pane-active-border-style 'fg=#7e9cd8'

# Faster key repetition
set -s escape-time 10
set -g repeat-time 600

# Reload config
bind r source-file ~/.tmux.conf \; display-message "Config reloaded"
